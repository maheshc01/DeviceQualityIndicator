openapi: 3.0.3
info:
  title: Media Streaming Rate Subscriptions
  description: |
    This API provides the API consumer with the ability to subscribe to Media Streaming Rate events.

    # Introduction

    ## Media Streaming Rate
    API consumer is able to be notified when the media streaming rate of a certain user device has changed.
    This capability is provided via a subscription request - in this case the media streaming rate situation is part of the event notification, which is sent back to the event subscriber when the media streaming rate has changed.

    # Relevant terms and definitions

    * **Device**: A device refers to any physical entity that can connect to a network and participate in network communication.

        At least one identifier for the device out of four options must be provided: IPv4 address, IPv6 address, Phone number, or Network Access Identifier assigned by the mobile network operator for the device. Where more than one device identifier is provided, only one identifier will be selected by the implementation and this choice indicated to the API consumer in the session creation response.

        Note: Network Access Identifier is defined for future use and will not be supported with this version of the API.

    # API Functionality

    The API exposes following capability:

    ## Media streaming rate subscription

    These endpoints allow to manage event subscription on media streaming rate event.
    The CAMARA subscription model is detailed in the CAMARA API design guideline document and follows CloudEvents specification.

    When subscribing, it is mandatory to provide the event `types` you are subscribing to, as multiple subscription-types are managed by this API.

    Following event ``types`` are managed for this API:
      - ``org.camaraproject.media-streaming-rate-subscriptions.v0.media-rate-changed``: Event triggered when the device's maximum downstream media streaming rate changes.

    Note: Additionally, the following events could be sent, which do not require a dedicated subscription:
      - `org.camaraproject.media-streaming-rate-subscriptions.v0.subscription-started` is sent when the subscription starts.
      - `org.camaraproject.media-streaming-rate-subscriptions.v0.subscription-updated` is sent when the subscription is updated.
      - `org.camaraproject.media-streaming-rate-subscriptions.v0.subscription-ended` is sent when the subscription ends.

    It is used in following cases:
      - the subscription expire time (optionally set by the requester) has been reached
      - the maximum number of subscription events (optionally set by the requester) has been reached
      - the subscription was deleted by the requester
      - the Access Token `sinkCredential` (optionally set by the requester) expiration time has been reached
      - the API server has to stop sending notification prematurely

    **Note on combined usage of ``initialEvent`` and ``subscriptionMaxEvents``**:

    If an event is triggered following ``initialEvent`` set to true,
    this event will be counted towards ``subscriptionMaxEvents`` (if provided).

    **Clarification on ``initialEvent`` behaviour:**

    If ``initialEvent`` is set to true, an event will be triggered immediately upon subscription creation with the current media streaming rate for the device.

    ### Notifications callback

    This endpoint describes the event notification received on subscription listener side when the event occurred.
    As for subscription, detailed description of the event notification is provided in the CAMARA API design guideline document.

    _**WARNING**: This callback endpoint must be exposed on the consumer side as `POST /{$request.body#/sink}`.
      Developers may provide a callback URL on which notifications regarding media-streaming-rate can be received from the service provider.
      If an event occurs the application will send events to the provided webhook - `sink`._

    # Further info and support

    ## Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.

    ## Identifying the device from the access token

    This API requires the API consumer to identify a device as the subject of the API as follows:
    - When the API is invoked using a two-legged access token, the subject will be identified from the optional `device` object, which therefore MUST be provided.

    - When a three-legged access token is used however, this optional identifier MUST NOT be provided, as the subject will be uniquely identified from the access token.

    This approach simplifies API usage for API consumers using a three-legged access token to invoke the API by relying on the information that is associated with the access token and was identified during the authentication process.

    ### Error handling:
    - If the subject cannot be identified from the access token and the optional `device` object is not included in the request, then the server will return an error with the `422 MISSING_IDENTIFIER` error code.

    - If the subject can be identified from the access token and the optional `device` object is also included in the request, then the server will return an error with the `422 UNNECESSARY_IDENTIFIER` error code. This will be the case even if the same device is identified by these two methods, as the server is unable to make this comparison.

    ## Multi-SIM scenario handling

    In multi-SIM scenarios where more than one mobile device is associated with a phone number (e.g. a smartphone with an associated smartwatch), it might not be possible to uniquely identify from that phone number the device for which media streaming rate notifications should be provided. If the phone number is used as the device identifier when creating a subscription for a multi-SIM scenario, the API may:
    - respond with an error, or
    - provide media streaming rate update notifications for the multi-SIM group as a whole, or
    - provide media streaming rate update notifications only for a single device in the multi-SIM group, which may not be the intended device.

    Possible solutions in such a scenario include:
    - Using the authorisation code flow to obtain an access token, which will automatically identify the intended device
    - Identifying the intended device from a unique identifier for that device, such as its source IP address and port
    - Check with the SIM provider whether a unique "secondary" phone number is already associated with each device, and use the secondary phone number to identify the intended device if available.

    ## Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification may not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.

